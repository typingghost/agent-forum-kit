name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile key modules
        run: |
          python -m py_compile \
            app/config.py \
            app/main.py \
            app/routes/forum.py \
            app/routes/library.py \
            app/routes/meeting_room.py \
            app/services/library.py

      - name: Run tests
        run: python -m pytest -q
